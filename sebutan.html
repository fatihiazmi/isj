<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misi 2: Makhraj Master</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e67e22" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
</head>
<body x-data="sebutan" x-init="init()">

  <a href="/index.html" class="btn-back">← Kembali</a>

  <div class="activity-box">
    <h1>Misi 2: Makhraj Master 🎤</h1>

    <div x-show="!letterData">
      <p class="subtitle">Sila selesaikan Misi 1 dahulu!</p>
    </div>

    <div x-show="letterData">
      <p class="subtitle" x-text="letterData && letterData.isBare ? 'Sebut nama huruf ini:' : 'Sebut huruf dengan baris:'"></p>
      <div class="huruf-display" x-text="letterData && letterData.display"></div>
      <p style="font-size: 1.2rem; color: #7f8c8d;">
        <span x-show="letterData && letterData.isBare">Sebut: "<span x-text="letterData && letterData.pronunciation"></span>"</span>
        <span x-show="letterData && !letterData.isBare"><span x-text="letterData && letterData.barisName"></span> — sebut: "<span x-text="letterData && letterData.pronunciation"></span>"</span>
      </p>
      <p style="font-size: 0.9rem; color: #7f8c8d;">
        <span x-text="currentBaris + 1"></span> / 4
      </p>

      <div style="margin-bottom: 15px;">
        <button class="btn-listen" @click="listenLetter()" :disabled="playing"
                x-text="playing ? '🔊 Sedang bermain...' : '🔊 Dengar Sebutan'">
        </button>
      </div>

      <!-- READY -->
      <div x-show="step === 'ready'" style="margin-top: 10px;">
        <button class="btn-record" @click="record()">
          🎤 Rakam Sebutan
        </button>
      </div>

      <!-- RECORDING -->
      <div x-show="step === 'recording'" style="margin-top: 10px;">
        <p class="recording-pulse">🔴 Merakam... Sebut sekarang!</p>
        <button class="btn-danger" @click="stop()" style="margin-top: 10px; padding: 14px 28px; font-size: 1.1rem;">
          ⏹️ Berhenti
        </button>
      </div>

      <!-- REVIEW -->
      <div x-show="step === 'review'" style="margin-top: 15px;">
        <p style="color: #27ae60; font-weight: bold; font-size: 1.1rem;">Rakaman siap!</p>

        <button class="btn-listen" @click="playRecording()" style="margin: 10px 0;">
          🔊 Dengar Semula
        </button>

        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #bdc3c7;">
          <p style="color: #34495e; font-size: 1rem; font-weight: bold;">Guru: Adakah sebutan betul?</p>
          <button class="btn-secondary"
                  style="display: block; width: 100%; max-width: 280px; margin: 12px auto 0; padding: 16px 28px; font-size: 1.2rem;"
                  @click="teacherMark('correct')">✅ Betul</button>
          <button class="btn-danger"
                  style="display: block; width: 100%; max-width: 280px; margin: 12px auto 0; padding: 16px 28px; font-size: 1.2rem;"
                  @click="teacherMark('incorrect')">❌ Cuba Lagi</button>
        </div>
      </div>

      <!-- CORRECT -->
      <div x-show="step === 'correct'" style="margin-top: 15px;">
        <p class="feedback-success">Guru sahkan: Betul! 🎉</p>
        <button class="btn-primary" @click="next()" style="margin-top: 15px;">
          Seterusnya ➡️
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import Alpine from 'alpinejs'
    import { getActiveStudent } from '/js/student.js'
    import { getStudentProgress, markLevelComplete, logAttempt, getCurrentLevel, isMissionAvailable, getNextBaris } from '/js/progress.js'
    import { getLetterWithBaris } from '/js/hijaiyah.js'
    import { speakLetter } from '/js/audio.js'
    import { startRecording, stopRecording } from '/js/recorder.js'

    Alpine.data('sebutan', () => ({
      student: null,
      letterData: null,
      currentLevel: 1,
      currentBaris: 0,
      step: 'ready',
      recordingUrl: null,
      playing: false,
      progress: [],

      async init() {
        this.student = getActiveStudent()
        if (!this.student) { window.location.href = '/index.html'; return }

        this.progress = await getStudentProgress(this.student.id)
        const pos = await getCurrentLevel(this.student.id)
        this.currentLevel = pos.level
        if (this.currentLevel > 28) { this.letterData = null; return }

        const available = await isMissionAvailable(this.student.id, 2, this.currentLevel)
        if (!available) { this.letterData = null; return }

        const next = getNextBaris(this.progress, 2, this.currentLevel)
        this.currentBaris = next !== null ? next : 0
        this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
      },

      async listenLetter() {
        this.playing = true
        await speakLetter(this.letterData)
        this.playing = false
      },

      async record() {
        try {
          await startRecording()
          this.step = 'recording'
          this.recordingUrl = null
        } catch (err) {
          alert('Sila benarkan akses mikrofon di tetapan pelayar.')
        }
      },

      async stop() {
        const url = await stopRecording()
        this.recordingUrl = url
        this.step = 'review'
      },

      playRecording() {
        if (this.recordingUrl) {
          new Audio(this.recordingUrl).play()
        }
      },

      async teacherMark(result) {
        await logAttempt(this.student.id, 2, this.currentLevel, this.currentBaris, 'recording', result)
        if (result === 'correct') {
          await markLevelComplete(this.student.id, 2, this.currentLevel, this.currentBaris)
          this.step = 'correct'
        } else {
          this.recordingUrl = null
          this.step = 'ready'
        }
      },

      async next() {
        this.progress = await getStudentProgress(this.student.id)
        const nextBaris = getNextBaris(this.progress, 2, this.currentLevel)
        if (nextBaris !== null) {
          this.currentBaris = nextBaris
          this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
          this.recordingUrl = null
          this.step = 'ready'
        } else {
          window.location.href = `/index.html?done=2&level=${this.currentLevel}`
        }
      }
    }))

    Alpine.start()
  </script>
</body>
</html>
