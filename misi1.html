<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misi 1: Explorer</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body x-data="explorer" x-init="init()">

  <a href="/index.html" class="btn-back">← Kembali</a>

  <div class="activity-box">
    <h1>Misi 1: Explorer 📖</h1>

    <template x-if="!letter">
      <p class="subtitle">Semua huruf sudah dipelajari!</p>
    </template>

    <template x-if="letter">
      <div>
        <p class="subtitle">Kenali huruf ini:</p>
        <div class="huruf-display" x-text="letter.letter"></div>
        <p style="font-size: 1.5rem;">
          <strong x-text="letter.name"></strong>
          (<span x-text="letter.transliteration"></span>)
        </p>

        <p x-show="feedback" :class="feedback === 'success' ? 'feedback-success' : ''" x-text="feedbackText"></p>

        <button class="btn-primary" @click="complete()" x-show="!feedback">
          Saya Faham! ✅
        </button>
        <button class="btn-primary" @click="next()" x-show="feedback">
          Seterusnya ➡️
        </button>
      </div>
    </template>
  </div>

  <script type="module">
    import Alpine from 'alpinejs'
    import { getActiveStudent } from '/js/student.js'
    import { getStudentProgress, markLevelComplete, logAttempt, getCurrentLevel, isMissionAvailable } from '/js/progress.js'
    import { getLetterByIndex } from '/js/hijaiyah.js'

    Alpine.data('explorer', () => ({
      student: null,
      letter: null,
      currentLevel: 1,
      feedback: null,
      feedbackText: '',

      async init() {
        this.student = getActiveStudent()
        if (!this.student) { window.location.href = '/index.html'; return }
        this.currentLevel = await getCurrentLevel(this.student.id)
        this.letter = getLetterByIndex(this.currentLevel)
      },

      async complete() {
        await markLevelComplete(this.student.id, 1, this.currentLevel)
        await logAttempt(this.student.id, 1, this.currentLevel, 'manual', 'correct')
        this.feedback = 'success'
        this.feedbackText = 'Hebat! 🎉'
      },

      async next() {
        window.location.href = `/index.html?done=1&level=${this.currentLevel}`
      }
    }))

    Alpine.start()
  </script>
</body>
</html>
