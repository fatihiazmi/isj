<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misi 1: Explorer</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body x-data="explorer" x-init="init()">

  <a href="/index.html" class="btn-back">← Kembali</a>

  <div class="activity-box">
    <h1>Misi 1: Explorer 📖</h1>

    <template x-if="!letterData">
      <p class="subtitle">Semua huruf sudah dipelajari!</p>
    </template>

    <template x-if="letterData">
      <div>
        <p class="subtitle">Kenali huruf ini:</p>
        <div class="huruf-display" x-text="letterData.display"></div>
        <p style="font-size: 1.5rem;">
          <strong x-text="letterData.name"></strong>
          — <span x-text="letterData.barisName"></span>
          (<span x-text="letterData.pronunciation"></span>)
        </p>
        <p style="font-size: 0.9rem; color: #7f8c8d;">
          Baris <span x-text="currentBaris"></span> / 3
        </p>

        <p x-show="feedback" :class="feedback === 'success' ? 'feedback-success' : ''" x-text="feedbackText"></p>

        <button class="btn-primary" @click="complete()" x-show="!feedback">
          Saya Faham! ✅
        </button>
        <button class="btn-primary" @click="next()" x-show="feedback">
          Seterusnya ➡️
        </button>
      </div>
    </template>
  </div>

  <script type="module">
    import Alpine from 'alpinejs'
    import { getActiveStudent } from '/js/student.js'
    import { getStudentProgress, markLevelComplete, logAttempt, getCurrentLevel, getNextBaris } from '/js/progress.js'
    import { getLetterWithBaris } from '/js/hijaiyah.js'

    Alpine.data('explorer', () => ({
      student: null,
      letterData: null,
      currentLevel: 1,
      currentBaris: 1,
      feedback: null,
      feedbackText: '',
      progress: [],

      async init() {
        this.student = getActiveStudent()
        if (!this.student) { window.location.href = '/index.html'; return }
        this.progress = await getStudentProgress(this.student.id)
        const pos = await getCurrentLevel(this.student.id)
        this.currentLevel = pos.level
        if (this.currentLevel > 28) { this.letterData = null; return }
        // Find next incomplete baris for mission 1 at this level
        this.currentBaris = getNextBaris(this.progress, 1, this.currentLevel) || 1
        this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
      },

      async complete() {
        await markLevelComplete(this.student.id, 1, this.currentLevel, this.currentBaris)
        await logAttempt(this.student.id, 1, this.currentLevel, this.currentBaris, 'manual', 'correct')
        this.feedback = 'success'
        this.feedbackText = 'Hebat! 🎉'
      },

      async next() {
        // Refresh progress and check if more baris left for this letter
        this.progress = await getStudentProgress(this.student.id)
        const nextBaris = getNextBaris(this.progress, 1, this.currentLevel)
        if (nextBaris) {
          // More baris to do — stay on page
          this.currentBaris = nextBaris
          this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
          this.feedback = null
          this.feedbackText = ''
        } else {
          // All 3 baris done — letter complete for mission 1
          window.location.href = `/index.html?done=1&level=${this.currentLevel}`
        }
      }
    }))

    Alpine.start()
  </script>
</body>
</html>
