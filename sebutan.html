<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misi 2: Makhraj Master</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body x-data="sebutan" x-init="init()">

  <a href="/index.html" class="btn-back">← Kembali</a>

  <div class="activity-box">
    <h1>Misi 2: Makhraj Master 🎤</h1>

    <template x-if="!letterData">
      <p class="subtitle">Sila selesaikan Misi 1 dahulu!</p>
    </template>

    <template x-if="letterData">
      <div>
        <p class="subtitle" x-text="letterData.isBare ? 'Sebut nama huruf ini:' : 'Sebut huruf dengan baris:'"></p>
        <div class="huruf-display" x-text="letterData.display"></div>
        <p style="font-size: 1.2rem; color: #7f8c8d;">
          <template x-if="letterData.isBare">
            <span>Sebut: "<span x-text="letterData.pronunciation"></span>"</span>
          </template>
          <template x-if="!letterData.isBare">
            <span><span x-text="letterData.barisName"></span> — sebut: "<span x-text="letterData.pronunciation"></span>"</span>
          </template>
        </p>
        <p style="font-size: 0.9rem; color: #7f8c8d;">
          <span x-text="currentBaris + 1"></span> / 4
        </p>

        <!-- Step 1: Listen to example -->
        <button class="btn-listen" @click="listenLetter()" :disabled="playing">
          <span x-show="!playing">🔊 Dengar Sebutan</span>
          <span x-show="playing">🔊 Sedang bermain...</span>
        </button>

        <!-- Step 2: Record -->
        <div x-show="!recording && !recordingUrl && !feedback" style="margin-top: 10px;">
          <button class="btn-record" @click="record()">
            🎤 Rakam Sebutan
          </button>
        </div>

        <!-- Recording in progress -->
        <div x-show="recording" style="margin-top: 10px;">
          <p class="recording-pulse">🔴 Merakam... Sebut sekarang!</p>
          <button class="btn-danger" @click="stop()" style="margin-top: 10px;">
            ⏹️ Berhenti
          </button>
        </div>

        <!-- Step 3: Playback + teacher review -->
        <div x-show="recordingUrl && !feedback" style="margin-top: 15px;">
          <p style="color: #27ae60; font-weight: bold; font-size: 1.1rem;">Rakaman siap!</p>

          <button class="btn-listen" @click="playRecording()" style="margin-top: 10px;">
            🔊 Dengar Semula
          </button>

          <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #bdc3c7;">
            <p style="color: #7f8c8d; font-size: 0.95rem;">Guru: Adakah sebutan betul?</p>
            <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
              <button class="btn-secondary" @click="teacherMark('correct')">✅ Betul</button>
              <button class="btn-danger" @click="teacherMark('incorrect')">❌ Cuba Lagi</button>
            </div>
          </div>
        </div>

        <!-- Feedback -->
        <div x-show="feedback">
          <p :class="feedback === 'correct' ? 'feedback-success' : 'feedback-error'" x-text="feedbackText"></p>

          <button class="btn-primary" @click="next()" x-show="feedback === 'correct'" style="margin-top: 15px;">
            Seterusnya ➡️
          </button>
        </div>
      </div>
    </template>
  </div>

  <script type="module">
    import Alpine from 'alpinejs'
    import { getActiveStudent } from '/js/student.js'
    import { getStudentProgress, markLevelComplete, logAttempt, getCurrentLevel, isMissionAvailable, getNextBaris } from '/js/progress.js'
    import { getLetterWithBaris } from '/js/hijaiyah.js'
    import { speakLetter } from '/js/audio.js'
    import { startRecording, stopRecording } from '/js/recorder.js'

    Alpine.data('sebutan', () => ({
      student: null,
      letterData: null,
      currentLevel: 1,
      currentBaris: 0,
      recording: false,
      recordingUrl: null,
      feedback: null,
      feedbackText: '',
      playing: false,
      progress: [],

      async init() {
        this.student = getActiveStudent()
        if (!this.student) { window.location.href = '/index.html'; return }

        this.progress = await getStudentProgress(this.student.id)
        const pos = await getCurrentLevel(this.student.id)
        this.currentLevel = pos.level
        if (this.currentLevel > 28) { this.letterData = null; return }

        const available = await isMissionAvailable(this.student.id, 2, this.currentLevel)
        if (!available) { this.letterData = null; return }

        const next = getNextBaris(this.progress, 2, this.currentLevel)
        this.currentBaris = next !== null ? next : 0
        this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
      },

      async listenLetter() {
        this.playing = true
        await speakLetter(this.letterData)
        this.playing = false
      },

      async record() {
        try {
          await startRecording()
          this.recording = true
          this.recordingUrl = null
          this.feedback = null
        } catch (err) {
          alert('Sila benarkan akses mikrofon di tetapan pelayar.')
        }
      },

      async stop() {
        const url = await stopRecording()
        this.recording = false
        this.recordingUrl = url
      },

      playRecording() {
        if (this.recordingUrl) {
          const audio = new Audio(this.recordingUrl)
          audio.play()
        }
      },

      async teacherMark(result) {
        await logAttempt(this.student.id, 2, this.currentLevel, this.currentBaris, 'recording', result)
        if (result === 'correct') {
          await markLevelComplete(this.student.id, 2, this.currentLevel, this.currentBaris)
          this.feedback = 'correct'
          this.feedbackText = 'Guru sahkan: Betul! 🎉'
        } else {
          // Reset for another try
          this.recordingUrl = null
          this.feedback = null
        }
      },

      async next() {
        this.progress = await getStudentProgress(this.student.id)
        const nextBaris = getNextBaris(this.progress, 2, this.currentLevel)
        if (nextBaris !== null) {
          this.currentBaris = nextBaris
          this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
          this.recordingUrl = null
          this.feedback = null
          this.feedbackText = ''
        } else {
          window.location.href = `/index.html?done=2&level=${this.currentLevel}`
        }
      }
    }))

    Alpine.start()
  </script>
</body>
</html>
