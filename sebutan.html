<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misi 2: Makhraj Master</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body x-data="sebutan" x-init="init()">

  <a href="/index.html" class="btn-back">← Kembali</a>

  <div class="activity-box">
    <h1>Misi 2: Makhraj Master 🎤</h1>

    <template x-if="!letterData">
      <p class="subtitle">Sila selesaikan Misi 1 dahulu!</p>
    </template>

    <template x-if="letterData">
      <div>
        <p class="subtitle" x-text="letterData.isBare ? 'Sebut nama huruf ini:' : 'Sebut huruf dengan baris:'"></p>
        <div class="huruf-display" x-text="letterData.display"></div>
        <p style="font-size: 1.2rem; color: #7f8c8d;">
          <template x-if="letterData.isBare">
            <span>Sebut: "<span x-text="letterData.pronunciation"></span>"</span>
          </template>
          <template x-if="!letterData.isBare">
            <span><span x-text="letterData.barisName"></span> — sebut: "<span x-text="letterData.pronunciation"></span>"</span>
          </template>
        </p>
        <p style="font-size: 0.9rem; color: #7f8c8d;">
          <span x-text="currentBaris + 1"></span> / 4
        </p>

        <button class="btn-listen" @click="listenLetter()" :disabled="playing">
          <span x-show="!playing">🔊 Dengar Sebutan</span>
          <span x-show="playing">🔊 Sedang bermain...</span>
        </button>

        <!-- Mic permission denied message -->
        <div x-show="micDenied" style="margin: 15px 0;">
          <p style="color: #e74c3c; font-weight: bold;">Mikrofon tidak dibenarkan.</p>
          <p style="color: #7f8c8d; font-size: 0.85rem;">Sila benarkan akses mikrofon di tetapan pelayar, atau gunakan butang guru di bawah.</p>
        </div>

        <div x-show="!listening && !feedback && !micDenied">
          <button class="btn-primary" @click="listen()" style="font-size: 1.3rem; padding: 18px 40px;">
            🎤 Tekan & Sebut
          </button>
        </div>

        <div x-show="listening" style="margin: 20px 0;">
          <p class="subtitle">🔴 Mendengar... Sebut sekarang!</p>
        </div>

        <div x-show="feedback">
          <p :class="feedback === 'correct' ? 'feedback-success' : 'feedback-error'" x-text="feedbackText"></p>

          <div x-show="feedback === 'incorrect'" style="margin-top: 20px;">
            <p style="color: #7f8c8d; font-size: 0.9rem;">Guru: Adakah sebutan betul?</p>
            <button class="btn-secondary" @click="teacherMark('correct')" style="margin: 5px;">✅ Betul</button>
            <button class="btn-danger" @click="teacherMark('incorrect')" style="margin: 5px;">❌ Cuba Lagi</button>
          </div>

          <button class="btn-primary" @click="next()" x-show="feedback === 'correct'" style="margin-top: 15px;">
            Seterusnya ➡️
          </button>
        </div>

        <!-- Always-visible teacher override for when mic fails -->
        <div x-show="!feedback && (micDenied || micUnsupported)" style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #bdc3c7;">
          <p style="color: #7f8c8d; font-size: 0.9rem;">Penilaian Guru:</p>
          <button class="btn-secondary" @click="teacherMark('correct')" style="margin: 5px;">✅ Betul</button>
          <button class="btn-danger" @click="teacherMark('incorrect')" style="margin: 5px;">❌ Cuba Lagi</button>
        </div>
      </div>
    </template>
  </div>

  <script type="module">
    import Alpine from 'alpinejs'
    import { getActiveStudent } from '/js/student.js'
    import { getStudentProgress, markLevelComplete, logAttempt, getCurrentLevel, isMissionAvailable, getNextBaris } from '/js/progress.js'
    import { getLetterWithBaris } from '/js/hijaiyah.js'
    import { startListening, checkPronunciation, requestMicPermission } from '/js/speech.js'
    import { speakLetter } from '/js/audio.js'

    Alpine.data('sebutan', () => ({
      student: null,
      letterData: null,
      currentLevel: 1,
      currentBaris: 0,
      listening: false,
      feedback: null,
      feedbackText: '',
      micDenied: false,
      micUnsupported: false,
      playing: false,
      progress: [],

      async init() {
        this.student = getActiveStudent()
        if (!this.student) { window.location.href = '/index.html'; return }

        // Check Speech API support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
        if (!SpeechRecognition) {
          this.micUnsupported = true
        }

        this.progress = await getStudentProgress(this.student.id)
        const pos = await getCurrentLevel(this.student.id)
        this.currentLevel = pos.level
        if (this.currentLevel > 28) { this.letterData = null; return }

        const available = await isMissionAvailable(this.student.id, 2, this.currentLevel)
        if (!available) { this.letterData = null; return }

        const next = getNextBaris(this.progress, 2, this.currentLevel)
        this.currentBaris = next !== null ? next : 0
        this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
      },

      async listenLetter() {
        this.playing = true
        await speakLetter(this.letterData)
        this.playing = false
      },

      async listen() {
        // Request mic permission first
        const hasPermission = await requestMicPermission()
        if (!hasPermission) {
          this.micDenied = true
          return
        }

        this.listening = true
        this.feedback = null
        try {
          const results = await startListening('ar-SA')
          const correct = checkPronunciation(results, this.letterData)
          if (correct) {
            this.feedback = 'correct'
            this.feedbackText = 'HEBAT! Betul! 🎉'
            await markLevelComplete(this.student.id, 2, this.currentLevel, this.currentBaris)
            await logAttempt(this.student.id, 2, this.currentLevel, this.currentBaris, 'speech', 'correct')
          } else {
            this.feedback = 'incorrect'
            this.feedbackText = 'Cuba lagi... Atau minta guru semak.'
            await logAttempt(this.student.id, 2, this.currentLevel, this.currentBaris, 'speech', 'incorrect')
          }
        } catch (err) {
          this.feedback = 'incorrect'
          this.feedbackText = 'Mikrofon tidak berfungsi. Minta guru semak.'
        }
        this.listening = false
      },

      async teacherMark(result) {
        await logAttempt(this.student.id, 2, this.currentLevel, this.currentBaris, 'manual', result)
        if (result === 'correct') {
          await markLevelComplete(this.student.id, 2, this.currentLevel, this.currentBaris)
          this.feedback = 'correct'
          this.feedbackText = 'Guru sahkan: Betul! 🎉'
        } else {
          this.feedback = null
        }
      },

      async next() {
        // Refresh progress and check for more baris
        this.progress = await getStudentProgress(this.student.id)
        const nextBaris = getNextBaris(this.progress, 2, this.currentLevel)
        if (nextBaris) {
          this.currentBaris = nextBaris
          this.letterData = getLetterWithBaris(this.currentLevel, this.currentBaris)
          this.feedback = null
          this.feedbackText = ''
        } else {
          window.location.href = `/index.html?done=2&level=${this.currentLevel}`
        }
      }
    }))

    Alpine.start()
  </script>
</body>
</html>
