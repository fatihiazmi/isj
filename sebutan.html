<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misi 2: Makhraj Master</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body x-data="sebutan" x-init="init()">

  <a href="/index.html" class="btn-back">← Kembali</a>

  <div class="activity-box">
    <h1>Misi 2: Makhraj Master 🎤</h1>

    <template x-if="!letter">
      <p class="subtitle">Sila selesaikan Misi 1 dahulu!</p>
    </template>

    <template x-if="letter">
      <div>
        <p class="subtitle">Sebut huruf di bawah:</p>
        <div class="huruf-display" x-text="letter.letter"></div>

        <div x-show="!listening && !feedback">
          <button class="btn-primary" @click="listen()">🎤 Tekan & Sebut</button>
        </div>

        <p x-show="listening" class="subtitle">Mendengar... Sebut huruf ini!</p>

        <div x-show="feedback">
          <p :class="feedback === 'correct' ? 'feedback-success' : 'feedback-error'" x-text="feedbackText"></p>

          <div x-show="feedback === 'incorrect'" style="margin-top: 20px;">
            <p style="color: #7f8c8d; font-size: 0.9rem;">Guru: Adakah sebutan betul?</p>
            <button class="btn-secondary" @click="teacherMark('correct')" style="margin: 5px;">✅ Betul</button>
            <button class="btn-danger" @click="teacherMark('incorrect')" style="margin: 5px;">❌ Cuba Lagi</button>
          </div>

          <button class="btn-primary" @click="next()" x-show="feedback === 'correct'" style="margin-top: 15px;">
            Seterusnya ➡️
          </button>
        </div>
      </div>
    </template>
  </div>

  <script type="module">
    import Alpine from 'alpinejs'
    import { getActiveStudent } from '/js/student.js'
    import { markLevelComplete, logAttempt, getCurrentLevel, isMissionAvailable } from '/js/progress.js'
    import { getLetterByIndex } from '/js/hijaiyah.js'
    import { startListening, checkPronunciation } from '/js/speech.js'

    Alpine.data('sebutan', () => ({
      student: null,
      letter: null,
      currentLevel: 1,
      listening: false,
      feedback: null,
      feedbackText: '',

      async init() {
        this.student = getActiveStudent()
        if (!this.student) { window.location.href = '/index.html'; return }
        this.currentLevel = await getCurrentLevel(this.student.id)
        const available = await isMissionAvailable(this.student.id, 2, this.currentLevel)
        if (!available) { this.letter = null; return }
        this.letter = getLetterByIndex(this.currentLevel)
      },

      async listen() {
        this.listening = true
        this.feedback = null
        try {
          const results = await startListening('ar-SA')
          const correct = checkPronunciation(results, this.letter)
          if (correct) {
            this.feedback = 'correct'
            this.feedbackText = 'HEBAT! Betul! 🎉'
            await markLevelComplete(this.student.id, 2, this.currentLevel)
            await logAttempt(this.student.id, 2, this.currentLevel, 'speech', 'correct')
          } else {
            this.feedback = 'incorrect'
            this.feedbackText = 'Cuba lagi... Atau minta guru semak.'
            await logAttempt(this.student.id, 2, this.currentLevel, 'speech', 'incorrect')
          }
        } catch (err) {
          this.feedback = 'incorrect'
          this.feedbackText = 'Mikrofon tidak berfungsi. Minta guru semak.'
        }
        this.listening = false
      },

      async teacherMark(result) {
        await logAttempt(this.student.id, 2, this.currentLevel, 'manual', result)
        if (result === 'correct') {
          await markLevelComplete(this.student.id, 2, this.currentLevel)
          this.feedback = 'correct'
          this.feedbackText = 'Guru sahkan: Betul! 🎉'
        } else {
          this.feedback = null
        }
      },

      async next() {
        window.location.href = `/index.html?done=2&level=${this.currentLevel}`
      }
    }))

    Alpine.start()
  </script>
</body>
</html>
